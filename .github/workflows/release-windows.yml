name: Release Windows Installer

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri (Windows)
        working-directory: app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Generate latest.json updater manifest
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $bundleDir = "app/src-tauri/target/release/bundle/nsis"

          $exeFile = Get-ChildItem -Path $bundleDir -Filter "*.exe" | Select-Object -First 1
          $sigFile = Get-ChildItem -Path $bundleDir -Filter "*.exe.sig" | Select-Object -First 1

          if (-not $exeFile -or -not $sigFile) {
            Write-Error "Installer or .sig file not found in $bundleDir"
            exit 1
          }

          $signature = (Get-Content $sigFile.FullName -Raw).Trim()
          $downloadUrl = "https://github.com/Esteban12j/coco_parking/releases/download/$tag/$($exeFile.Name)"
          $pubDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")

          $manifest = [ordered]@{
            version  = $version
            notes    = "See release notes on GitHub."
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url       = $downloadUrl
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 5 | Set-Content "latest.json" -Encoding UTF8
          Write-Host "Generated latest.json for version $version"
          Get-Content "latest.json"

      - name: Create GitHub Release and upload installers
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/src-tauri/target/release/bundle/nsis/*.exe
            app/src-tauri/target/release/bundle/msi/*.msi
            latest.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
