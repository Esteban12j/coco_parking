name: Release Windows Installer

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri (Windows)
        working-directory: app
        run: npm run tauri build

      - name: Sign artifacts
        working-directory: app
        shell: powershell
        continue-on-error: true
        timeout-minutes: 8
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_PRIVATE_KEY_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          if (-not $env:TAURI_PRIVATE_KEY) {
            Write-Host "TAURI_PRIVATE_KEY is empty. Skipping artifact signing."
            exit 0
          }

          function Sign-IfFound($globPath, $label) {
            $files = Get-ChildItem -Path $globPath -ErrorAction SilentlyContinue
            if (-not $files -or $files.Count -eq 0) {
              Write-Host "No $label artifacts found at: $globPath"
              return
            }

            foreach ($file in $files) {
              Write-Host "Signing $label artifact: $($file.FullName)"
              $args = @(
                "tauri", "signer", "sign",
                "--private-key", $env:TAURI_PRIVATE_KEY
              )
              if ($env:TAURI_PRIVATE_KEY_PASSWORD) {
                $args += @("--password", $env:TAURI_PRIVATE_KEY_PASSWORD)
              }
              $args += $file.FullName

              & npx --yes @args
              if ($LASTEXITCODE -ne 0) {
                throw "Failed signing artifact: $($file.FullName)"
              }
            }
          }

          Sign-IfFound "src-tauri/target/release/bundle/nsis/*.exe" "NSIS"
          Sign-IfFound "src-tauri/target/release/bundle/msi/*.msi" "MSI"

      - name: Create GitHub Release and upload installers
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/src-tauri/target/release/bundle/nsis/*.exe
            app/src-tauri/target/release/bundle/msi/*.msi
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
